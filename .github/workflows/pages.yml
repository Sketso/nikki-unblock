name: deploy pages

# Publishes the GitHub Pages site (Pages Source = "GitHub Actions").
# The site serves:
#   /applist/  — the preset manifest + .lst lists the routers fetch (index.json + *.lst)
#   /apk/      — an untrusted apk repository (packages.adb + the latest .apk) for
#                `apk add`/LuCI Software/`apk upgrade` (added by feed.sh). Filled by the
#                separate "build & release" run; assembled here from its artifact.
#
# Triggers: applist edits on main, a finished build (to refresh /apk/), or manual dispatch.
on:
  push:
    branches: [main]
    paths: ["applist/**", ".github/workflows/pages.yml", "index.html"]
  workflow_run:
    workflows: ["build & release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# never run two Pages deploys at once; don't cancel an in-flight deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (applist + apk repo)
        env:
          GH_TOKEN: ${{ github.token }}
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          set -e
          mkdir -p _site
          cp -r applist _site/applist
          cp -f index.html _site/index.html 2>/dev/null || true

          # ---- /apk/ untrusted apk repository -------------------------------
          # Download the latest released .apk and build an ADB index (packages.adb)
          # with apk-tools 3.x from Alpine edge (same index format the router's
          # apk-tools 3.0.5 reads). Non-fatal: if it fails, applist still deploys.
          mkdir -p _site/apk
          # publish the PUBLIC signing key so feed.sh can install it into /etc/apk/keys/
          cp feed/nikki-unblock.pem _site/apk/nikki-unblock.pem
          if gh release download --repo "$GITHUB_REPOSITORY" \
               -p 'luci-app-nikki-unblock.apk' -D _site/apk 2>/dev/null; then
            # the router fetches packages by their canonical name <pkg>-<version>-r<rel>.apk,
            # so rename the stable release asset back before indexing
            ver=$(sed -n 's/^PKG_VERSION:=//p' luci-app-nikki-unblock/Makefile)
            rel=$(sed -n 's/^PKG_RELEASE:=//p' luci-app-nikki-unblock/Makefile)
            mv _site/apk/luci-app-nikki-unblock.apk \
               "_site/apk/luci-app-nikki-unblock-${ver}-r${rel}.apk"
            # Write the private signing key (from the repo secret) to a file OUTSIDE the published
            # dir. Its basename is the key id the client looks up in /etc/apk/keys/ — so name it
            # nikki-unblock.pem to match the public key feed.sh installs.
            keydir="$RUNNER_TEMP/apk-sign"; mkdir -p "$keydir"
            printf '%s' "$APK_SIGN_KEY" > "$keydir/nikki-unblock.pem"
            # --allow-untrusted: read the OpenWrt-signed .apk (its build key isn't in Alpine's trust
            # store); --sign-key: sign OUR index so the router trusts the repo (no apk-upgrade friction).
            docker run --rm -v "$PWD/_site/apk:/x" -v "$keydir:/keys:ro" alpine:edge sh -eu -c '
              apk add --no-cache apk-tools >/dev/null
              cd /x
              apk --allow-untrusted mkndx --sign-key /keys/nikki-unblock.pem --output packages.adb *.apk
              echo "index built + signed:"; ls -l
            ' || echo "!! index build failed — /apk/ left without an index this deploy"
            rm -rf "$keydir"   # never publish the private key
            # safety: the private key must never reach _site
            find _site -name '*.pem' -path '*apk*' -exec grep -l "PRIVATE" {} \; | grep -q . && \
              { echo "FATAL: private key leaked into _site"; exit 1; } || true
          else
            echo "no release .apk yet — /apk/ left empty this deploy"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
